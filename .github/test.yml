name: test

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: elixir:1.9.1-slim

    steps:
      - uses: actions/checkout@v1
      - name: Install Dependencies
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get
      - name: Install static assets
        run: |
          cd assets && yarn && yarn deploy
          && cd ../ && mix phx.digest
      - name: Run Tests
        run: mix test
